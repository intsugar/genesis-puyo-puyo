<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Puyo Puyo 2 - Sega Genesis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a12;
      background-image: radial-gradient(ellipse at 50% 30%, #14142a 0%, #0a0a12 70%);
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    /* ═══════════════════════════════════════
       GENESIS CONSOLE SHELL
       ═══════════════════════════════════════ */
    #console-body {
      background: #1a1a1a;
      border-radius: 10px 10px 6px 6px;
      padding: 4px 12px 4px;
      box-shadow:
        0 1px 0 #333 inset,
        0 -1px 0 #0a0a0a inset,
        1px 0 0 #2a2a2a inset,
        -1px 0 0 #2a2a2a inset,
        0 8px 40px rgba(0,0,0,0.7);
      position: relative;
      max-width: 540px;
      width: 95vw;
    }

    /* Top accent stripe */
    #console-body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1a1a1a 0%, #1a1a1a 20%, #4a3aaa 20%, #6a4ae0 50%, #4a3aaa 80%, #1a1a1a 80%);
      border-radius: 10px 10px 0 0;
    }

    #cartridge-slot {
      background: linear-gradient(180deg, #0e0e0e, #181818);
      height: 5px;
      border-radius: 2px;
      margin: 2px 60px 3px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 -1px 2px rgba(0,0,0,0.5) inset;
    }

    #title-label {
      text-align: center;
      margin-bottom: 6px;
    }
    #title-label .brand {
      font-size: 0.4rem;
      color: #6a4ae0;
      letter-spacing: 5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 3px;
    }
    #title-label .game-name {
      font-size: 0.58rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Screen bezel */
    #screen-bezel {
      background: #0e0e0e;
      border-radius: 4px;
      padding: 3px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6) inset, 0 0 0 1px #222;
      position: relative;
    }

    /* Game container */
    #game {
      background: #000;
      border-radius: 2px;
      min-height: 80px;
    }
    /* Emulator canvas */
    #game canvas {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Power LED row */
    #power-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 3px;
      padding: 0 6px;
    }
    .led-group { display: flex; align-items: center; gap: 5px; }
    .led-label { font-size: 0.35rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }
    .led { width: 6px; height: 6px; border-radius: 50%; background: #2a1a1a; box-shadow: 0 0 2px rgba(0,0,0,0.5) inset; }
    .led.on { background: #ff2020; box-shadow: 0 0 6px #ff2020, 0 0 14px rgba(255,32,32,0.4); }

    #start-btn {
      margin-top: 4px;
      padding: 6px 24px;
      font-size: 0.6rem;
      font-family: 'Press Start 2P', monospace;
      background: #6a4ae0;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: none;
      box-shadow: 0 3px 0 #3a2890, 0 4px 8px rgba(0,0,0,0.4);
    }
    #start-btn:hover { transform: translateY(1px); box-shadow: 0 2px 0 #3a2890; }
    #start-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #3a2890; }
    #loading { color: #6a4ae0; font-size: 0.5rem; margin-top: 6px; letter-spacing: 1px; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Desktop hints */
    #controls {
      margin-top: 6px; font-size: 0.4rem; text-align: center; color: #555; line-height: 2.2;
    }
    #controls kbd {
      background: #2a2a2a; border: 1px solid #444; border-bottom: 2px solid #333;
      border-radius: 3px; padding: 2px 6px; font-family: 'Press Start 2P', monospace;
      font-size: 0.33rem; color: #aaa;
    }
    #bottom-brand { margin-top: 6px; font-size: 0.3rem; color: #333; letter-spacing: 4px; text-transform: uppercase; }

    /* ═══════════════════════════════════════
       MOBILE CONTROLLER — Genesis 3-button
       Inspired by the classic controller shape
       ═══════════════════════════════════════ */
    #mobile-controls {
      display: none;
      width: 95vw;
      max-width: 540px;
      margin-top: 0;
      padding: 0;
      position: relative;
      height: 230px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #1a1a1a;
      border-radius: 0 0 10px 10px;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.7),
        1px 0 0 #2a2a2a inset,
        -1px 0 0 #2a2a2a inset,
        0 -1px 0 #0a0a0a inset;
    }

    /* SEGA GENESIS branding between console and controls */
    .ctrl-brand {
      text-align: center;
      padding: 6px 0 2px;
    }
    .ctrl-brand-sega {
      font-size: 0.32rem;
      color: #555;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .ctrl-brand-genesis {
      font-size: 0.5rem;
      color: #666;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Joystick — glossy recessed circle like the real controller */
    .joystick-zone {
      position: absolute;
      left: 8px;
      top: 36px;
      width: 150px;
      height: 150px;
    }
    .joystick-outer {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 125px; height: 125px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2a2a 0%, #111 50%, #1a1a1a 100%);
      border: 2px solid #333;
      box-shadow:
        0 0 0 3px #0a0a0a,
        0 3px 10px rgba(0,0,0,0.6) inset;
    }
    .joystick-base {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 90px; height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, #181818, #0e0e0e);
      border: 2px solid #252525;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5) inset;
    }
    .joystick-knob {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 50px; height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #3a3a3a, #1a1a1a);
      border: 2px solid #2a2a2a;
      box-shadow: 0 3px 4px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.06) inset;
      transition: none;
    }
    /* Red arrow indicators around the d-pad ring */
    .dpad-arrow {
      position: absolute;
      width: 0; height: 0;
      z-index: 2;
    }
    .arrow-up { left: 50%; top: 6px; transform: translateX(-50%); border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 5px solid #cc2020; }
    .arrow-down { left: 50%; bottom: 6px; transform: translateX(-50%); border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid #cc2020; }
    .arrow-left { top: 50%; left: 6px; transform: translateY(-50%); border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-right: 5px solid #cc2020; }
    .arrow-right { top: 50%; right: 6px; transform: translateY(-50%); border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-left: 5px solid #cc2020; }

    /* START button — small pill, positioned above action buttons */
    .start-area {
      position: absolute;
      right: 110px;
      top: 38px;
      text-align: center;
    }
    .start-label {
      font-size: 0.25rem;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .start-btn-touch {
      width: 44px; height: 12px;
      background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
      border: 1px solid #444;
      border-radius: 6px;
      box-shadow: 0 2px 0 #111, 0 1px 4px rgba(0,0,0,0.5);
      margin: 0 auto;
    }
    .start-btn-touch:active, .start-btn-touch.pressed {
      box-shadow: 0 0 0 #111;
      transform: translateY(2px);
    }

    /* A, B, C buttons — recessed area with 3 round buttons */
    .action-buttons {
      position: absolute;
      right: 8px;
      top: 60px;
    }
    /* Recessed pill-shaped area behind buttons */
    .btn-recess {
      width: 170px;
      height: 80px;
      background: #0e0e0e;
      border-radius: 40px;
      border: 2px solid #252525;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 10px;
      position: relative;
    }
    /* "TRIGGER" label */
    .trigger-label {
      position: absolute;
      top: -14px;
      right: 10px;
      font-size: 0.22rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .action-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #3a3a3a, #1a1a1a);
      border: 2px solid #2a2a2a;
      color: #cc2020;
      font-size: 0.5rem;
      font-family: 'Press Start 2P', monospace;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 3px 0 #0a0a0a,
        0 4px 8px rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .action-btn:active, .action-btn.pressed {
      box-shadow: 0 1px 0 #0a0a0a, 0 1px 3px rgba(0,0,0,0.3);
      transform: translateY(2px);
    }

    /* Sega GENESIS text at bottom of controller */
    .ctrl-bottom-brand {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
    .ctrl-sega-text {
      font-size: 0.28rem;
      color: #444;
      letter-spacing: 2px;
      display: block;
    }
    .ctrl-genesis-text {
      font-size: 0.45rem;
      color: #555;
      letter-spacing: 3px;
      font-weight: bold;
    }

    @media (pointer: coarse) {
      #mobile-controls { display: block; }
      #controls { display: none; }
      #bottom-brand { display: none; }
      #console-body {
        border-radius: 10px 10px 0 0;
        padding-bottom: 2px;
        box-shadow: 0 1px 0 #333 inset, 1px 0 0 #2a2a2a inset, -1px 0 0 #2a2a2a inset;
      }
    }
    @media (pointer: fine) {
      #mobile-controls { display: none; }
    }
  </style>
</head>
<body>

  <div id="console-body">
    <div id="cartridge-slot"></div>

    <div id="title-label">
      <span class="brand">Sega Genesis</span>
      <span class="game-name">Puyo Puyo 2</span>
    </div>

    <div id="screen-bezel">
      <div id="game"></div>
    </div>

    <div id="power-row">
      <div class="led-group">
        <span class="led" id="power-led"></span>
        <span class="led-label">Power</span>
      </div>
      <div id="loading">Loading...</div>
      <button id="start-btn" onclick="launchGame()">&#9654; Start</button>
      <span class="led-label" style="visibility:hidden">Pad</span>
    </div>
  </div>

  <!-- Mobile controller — Genesis 3-button pad -->
  <div id="mobile-controls">
    <div class="ctrl-brand">
      <span class="ctrl-brand-sega">SEGA</span>
      <span class="ctrl-brand-genesis"> GENESIS</span>
    </div>

    <!-- Joystick with glossy ring and red arrows -->
    <div class="joystick-zone" id="joystick-zone">
      <div class="joystick-outer">
        <div class="dpad-arrow arrow-up"></div>
        <div class="dpad-arrow arrow-down"></div>
        <div class="dpad-arrow arrow-left"></div>
        <div class="dpad-arrow arrow-right"></div>
        <div class="joystick-base">
          <div class="joystick-knob" id="joystick-knob"></div>
        </div>
      </div>
    </div>

    <!-- Start pill -->
    <div class="start-area">
      <div class="start-label">Start</div>
      <div class="start-btn-touch" data-btn="start"></div>
    </div>

    <!-- A, B, C in recessed pill area -->
    <div class="action-buttons">
      <div class="btn-recess">
        <span class="trigger-label">Trigger</span>
        <div class="action-btn" data-btn="a">A</div>
        <div class="action-btn" data-btn="b">B</div>
        <div class="action-btn" data-btn="c">C</div>
      </div>
    </div>

    <div class="ctrl-bottom-brand">
      <span class="ctrl-sega-text">SEGA</span>
      <span class="ctrl-genesis-text">GENESIS</span>
    </div>
  </div>

  <div id="controls">
    <kbd>&#8592;&#8593;&#8594;&#8595;</kbd> Move &nbsp;&bull;&nbsp;
    <kbd>A</kbd> A &nbsp;&bull;&nbsp;
    <kbd>S</kbd> B &nbsp;&bull;&nbsp;
    <kbd>D</kbd> C &nbsp;&bull;&nbsp;
    <kbd>Enter</kbd> Start
  </div>

  <div id="bottom-brand">16-Bit Video Game System</div>

  <script src="Genesis.min.js"></script>
  <script>
    var startBtn = document.getElementById('start-btn');
    var loadingEl = document.getElementById('loading');
    var powerLed = document.getElementById('power-led');
    var romData = null;

    fetch('rom.bin')
      .then(function(r) { return r.arrayBuffer(); })
      .then(function(buf) {
        romData = buf;
        loadingEl.style.display = 'none';
        startBtn.style.display = 'inline-block';
      })
      .catch(function() {
        loadingEl.textContent = 'ROM not found.';
      });

    function launchGame() {
      startBtn.style.display = 'none';
      powerLed.classList.add('on');

      embedGenesis({
        container: "game",
        name: "Puyo Puyo 2",
        rom: romData,
        soundEnabled: true,
        showMobileControls: false,
        player1: {
          up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight",
          start: "Enter", a: "KeyA", b: "KeyS", c: "KeyD",
          x: "KeyQ", y: "KeyW", z: "KeyE", mode: "KeyZ"
        },
        cbStarted: function() {
          // Style the emulator canvas after it loads
          setTimeout(function() {
            var c = document.querySelector('#game canvas');
            if (c) {
              c.style.display = 'block';
              c.style.width = '100%';
              c.style.height = 'auto';
            }
            // Hide emulator's own overlay buttons but NOT the canvas container
            var els = document.querySelectorAll('#game button, #game input');
            els.forEach(function(e) { e.style.display = 'none'; });
          }, 300);
        }
      });
    }

    // ── Virtual joystick ──
    (function() {
      var zone = document.getElementById('joystick-zone');
      var knob = document.getElementById('joystick-knob');
      if (!zone || !knob) return;
      var activeTouch = null;
      var maxDist = 38;
      var deadZone = 0.3;
      var currentDirs = {};

      function simKey(code, type) {
        document.dispatchEvent(new KeyboardEvent(type, { code: code, bubbles: true }));
      }

      var dirKeys = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };

      function updateDirs(dirs) {
        ['up','down','left','right'].forEach(function(d) {
          if (dirs[d] && !currentDirs[d]) simKey(dirKeys[d], 'keydown');
          if (!dirs[d] && currentDirs[d]) simKey(dirKeys[d], 'keyup');
          currentDirs[d] = dirs[d];
        });
      }

      function handleMove(cx, cy) {
        var rect = zone.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        var dx = cx - centerX;
        var dy = cy - centerY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; dist = maxDist; }
        knob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
        var norm = dist / maxDist;
        if (norm < deadZone) {
          updateDirs({ up: false, down: false, left: false, right: false });
          return;
        }
        var angle = Math.atan2(dy, dx);
        var dirs = { up: false, down: false, left: false, right: false };
        if (angle > -2.75 && angle < -0.39) dirs.up = true;
        if (angle > 0.39 && angle < 2.75) dirs.down = true;
        if (Math.abs(angle) > 1.96) dirs.left = true;
        if (Math.abs(angle) < 1.18) dirs.right = true;
        updateDirs(dirs);
      }

      function resetStick() {
        knob.style.transform = 'translate(-50%, -50%)';
        updateDirs({ up: false, down: false, left: false, right: false });
        activeTouch = null;
      }

      zone.addEventListener('touchstart', function(e) {
        e.preventDefault();
        activeTouch = e.changedTouches[0].identifier;
        handleMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (activeTouch === null) return;
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeTouch) {
            e.preventDefault();
            handleMove(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            return;
          }
        }
      }, { passive: false });

      document.addEventListener('touchend', function(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeTouch) { resetStick(); return; }
        }
      });
      document.addEventListener('touchcancel', function(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeTouch) { resetStick(); return; }
        }
      });
    })();

    // ── Action & Start button touch ──
    var btnKeyMap = { a: 'KeyA', b: 'KeyS', c: 'KeyD', start: 'Enter' };

    document.querySelectorAll('[data-btn]').forEach(function(el) {
      function simKey(code, type) {
        document.dispatchEvent(new KeyboardEvent(type, { code: code, bubbles: true }));
      }
      function press(e) {
        e.preventDefault();
        simKey(btnKeyMap[el.getAttribute('data-btn')], 'keydown');
        el.classList.add('pressed');
      }
      function release(e) {
        e.preventDefault();
        simKey(btnKeyMap[el.getAttribute('data-btn')], 'keyup');
        el.classList.remove('pressed');
      }
      el.addEventListener('touchstart', press, { passive: false });
      el.addEventListener('touchend', release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });
    });
  </script>
</body>
</html>
